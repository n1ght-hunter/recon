[package]
edition = "2021"
name = "recon"
version = "0.1.0"

[workspace]
resolver = "2"
members = ["crates/*"]

[dependencies]
dirs = "5.0.1"
iced.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true


[workspace.dependencies]
# local crates
capture = { path = "crates/capture" }


iced = { version = "0.13.1", features = ["image", "tokio", "debug"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing-subscriber = "0.3"
tracing = "0.1"
windows-capture = "1.4.2"
