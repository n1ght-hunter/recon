[package]
edition = "2021"
name = "recon"
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[workspace]
members = ["process_starter"]


[dependencies]
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing-subscriber = "0.3"
tracing = "0.1"

[dependencies.iced]
version = "0.13.1"
features = ["image", "tokio", "debug"]
