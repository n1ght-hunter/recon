[package]
edition = "2021"
name = "recon"
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[workspace]
members = [
  "process_starter",
  "window-capture",
]


[dependencies]
futures = "0.3"
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
tokio = {version = "1.19.2", features = ["full"]}
window-capture = {path = "./window-capture"}
image = "0.24"
tracing-subscriber = "0.3.17"
tracing = "0.1.37"

[dependencies.iced]
version = "0.10"
features = ["image", "tokio", "debug"]
