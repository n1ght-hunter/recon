experimental_monorepo_root = true

[monorepo]
config_roots = ["crates/recon_db", "plugins/test_plugin"]

[tools]
git-cliff = "latest"
typos = "latest"
protoc = "latest"
"github:taiki-e/cargo-hack" = "latest"
"github:guppy-rs/guppy" = { version = "latest", version_prefix = "cargo-hakari-" }
"cargo:sqlx-cli" = { version = "latest", features = "sqlite" }
[tools."github:bytecodealliance/wasm-pkg-tools"]
version = "latest"
bin = "wkg"
[tools."github:bytecodealliance/wasm-pkg-tools".platforms]
windows-x64 = { bin = "wkg.exe" }


[tasks.fix]
description = "Fix lint errors"
run = [
    "typos -w",
    "cargo hakari generate",
    "cargo hakari manage-deps --yes",
    "cargo clippy --workspace --fix --allow-no-vcs --all-targets",
    "cargo fmt --all",
]
